<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F11">
<title>GMAT Focus Tracker</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #0F0F11;
    --surface: #1A1A1F;
    --card: #222228;
    --card-2: #2a2a32;
    --border: #2e2e36;
    --accent: #4F8EF7;
    --success: #3DDC84;
    --warning: #FFBB33;
    --danger: #FF5252;
    --text: #F1F1F3;
    --muted: #888899;
    --c-concept: #4F8EF7;
    --c-drill: #FF8C42;
    --c-review: #3DDC84;
    --c-mock: #FF5252;
    --c-slip: #888899;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: 76px;
    position: relative;
  }
  .view {
    display: none;
    padding: 18px 16px 12px;
    animation: fadein 240ms ease-out;
  }
  .view.active { display: block; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* === NAV === */
  #nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  #nav .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 4px;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    border-radius: 10px;
    transition: color 180ms, background 180ms;
    letter-spacing: 0.4px;
  }
  #nav .nav-btn .ico {
    font-size: 22px;
    line-height: 1;
  }
  #nav .nav-btn.active {
    color: var(--accent);
  }
  #nav .nav-btn:active {
    background: var(--card);
  }

  /* === COMMON === */
  h1, h2, h3, h4 {
    font-weight: 700;
    color: var(--text);
  }
  .muted { color: var(--muted); }
  .stack > * + * { margin-top: 12px; }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .row.between { justify-content: space-between; }
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-type {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.6px;
    color: #0F0F11;
  }
  .badge-type.CONCEPT { background: var(--c-concept); color: #fff; }
  .badge-type.DRILL   { background: var(--c-drill); color: #fff; }
  .badge-type.REVIEW  { background: var(--c-review); color: #0F0F11; }
  .badge-type.MOCK    { background: var(--c-mock); color: #fff; }
  .badge-type.SLIP, .badge-type.REST { background: var(--c-slip); color: #fff; }
  .badge-type.EXAM    { background: var(--text); color: #0F0F11; }

  .btn {
    min-height: 48px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 160ms, border-color 160ms;
  }
  .btn:active { background: var(--card-2); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.success { background: var(--success); color: #0F0F11; border-color: var(--success); }
  .btn.warning { background: var(--warning); color: #0F0F11; border-color: var(--warning); }
  .btn.muted   { background: var(--surface); color: var(--muted); }
  .btn.small   { min-height: 38px; padding: 6px 12px; font-size: 13px; }

  input[type="text"], input[type="number"], input[type="date"], textarea {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    min-height: 44px;
  }
  textarea { min-height: 64px; resize: vertical; }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; display: block; margin-bottom: 4px; }

  /* === WEEK VIEW === */
  .phase-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 6px;
  }
  .phase-seg {
    flex: 1;
    height: 8px;
    border-radius: 2px;
    background: var(--border);
    transition: box-shadow 200ms;
  }
  .phase-seg.current {
    box-shadow: inset 0 0 0 2px #fff;
  }
  .phase-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .phase-labels span { font-weight: 700; }

  .week-header { margin-bottom: 14px; }
  .week-header .label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; }
  .week-header .range { font-size: 22px; font-weight: 800; margin-top: 2px; margin-bottom: 6px; line-height: 1.1; }

  .week-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .week-nav .btn { flex: 1; }
  .week-nav .btn:disabled { opacity: 0.35; }

  .day-strip {
    display: flex;
    justify-content: space-between;
    gap: 4px;
    background: var(--surface);
    padding: 10px 8px;
    border-radius: 12px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .day-strip .day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 2px;
    border-radius: 8px;
    cursor: pointer;
    min-height: 56px;
    justify-content: center;
  }
  .day-strip .day.today { background: rgba(255, 187, 51, 0.10); }
  .day-strip .day .lbl {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .day-strip .day.today .lbl { color: var(--warning); }
  .day-strip .day .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid var(--border);
  }
  .day-strip .day.done .dot { background: var(--success); border-color: var(--success); }
  .day-strip .day.today:not(.done) .dot { background: var(--warning); border-color: var(--warning); }
  .day-strip .day .dnum { font-size: 9px; color: var(--muted); }

  .win-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    cursor: pointer;
  }
  .win-row.done { background: rgba(61, 220, 132, 0.10); border-color: var(--success); }
  .win-row .cbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 6px;
    border: 2px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .win-row.done .cbox { background: var(--success); border-color: var(--success); }
  .win-row.done .cbox::after { content: "✓"; color: #0F0F11; font-weight: 900; font-size: 14px; }
  .win-row .txt { flex: 1; font-size: 13px; line-height: 1.4; }
  .win-row .txt .ttl { font-size: 10px; color: var(--warning); font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 3px; }

  .milestone {
    background: linear-gradient(135deg, rgba(255,187,51,.15), rgba(61,220,132,.15));
    border: 1px solid var(--warning);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.4;
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    transition: opacity 200ms;
  }
  .day-card.done { opacity: 0.7; background: var(--surface); }
  .day-card .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .day-card .head .left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .day-card .head .left .daylbl {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .day-card .head .date {
    font-size: 11px;
    color: var(--muted);
  }
  .day-card.done .topic { text-decoration: line-through; color: var(--muted); }
  .day-card .topic { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .day-card .meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .day-card .meta strong { color: var(--text); font-weight: 600; }
  .day-card .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .day-card .actions .btn { flex: 1; min-width: 130px; }

  /* === MOCKS VIEW === */
  .section-title {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sparkline-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .sparkline-card .stats {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .sparkline-card .stats div { text-align: center; }
  .sparkline-card .stats .val {
    font-size: 16px;
    color: var(--text);
    font-weight: 700;
    display: block;
  }
  .sparkline svg { width: 100%; height: 90px; display: block; }

  .mock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .mock-card .head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    min-height: 56px;
  }
  .mock-card .cbox {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 6px;
    border: 2px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .mock-card.checked .cbox { background: var(--success); border-color: var(--success); }
  .mock-card.checked .cbox::after { content: "✓"; color: #0F0F11; font-weight: 900; font-size: 15px; }
  .mock-card .info { flex: 1; min-width: 0; }
  .mock-card .info .name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .mock-card .info .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .mock-card .status {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }
  .mock-card.checked .status { color: var(--success); }
  .mock-card .panel {
    display: none;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .mock-card.open .panel { display: block; }
  .attempt-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .attempt-row .topl {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .attempt-row .scores {
    color: var(--muted);
    margin-bottom: 4px;
  }
  .attempt-row .scores strong { color: var(--text); }
  .attempt-row .notes { color: var(--muted); font-style: italic; }

  .score-form .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .score-form > * + * { margin-top: 10px; }

  .protocol-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 18px;
    padding: 14px;
  }
  .protocol-section ul {
    list-style: none;
    padding: 0;
    margin-top: 8px;
  }
  .protocol-section li {
    font-size: 12px;
    color: var(--muted);
    padding: 4px 0;
    padding-left: 16px;
    position: relative;
  }
  .protocol-section li::before {
    content: "•";
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  /* === TOPICS VIEW === */
  .topic-group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .topic-group .ghead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .topic-group .gname { font-size: 14px; font-weight: 700; }
  .topic-group .gstats { font-size: 11px; color: var(--muted); }
  .topic-group .gbar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .topic-group .gbar .fill {
    height: 100%;
    background: var(--success);
    transition: width 280ms ease;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    background: var(--card-2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    min-height: 36px;
    display: inline-flex;
    align-items: center;
    transition: all 160ms;
  }
  .chip.in_progress {
    background: rgba(255, 187, 51, 0.18);
    color: var(--warning);
    border-color: var(--warning);
  }
  .chip.mastered {
    background: rgba(61, 220, 132, 0.18);
    color: var(--success);
    border-color: var(--success);
  }

  /* === CALENDAR VIEW === */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .cal-header .month-title { font-size: 18px; font-weight: 800; }
  .cal-header .navbtn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 14px;
  }
  .cal-wd {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 0;
  }
  .cal-cell {
    aspect-ratio: 1 / 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    min-height: 52px;
  }
  .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-cell.outside { opacity: 0.22; cursor: default; }
  .cal-cell.today { box-shadow: 0 0 0 2px var(--warning); }
  .cal-cell.selected { background: rgba(255, 187, 51, 0.16); box-shadow: 0 0 0 2px var(--warning); }
  .cal-cell .dnum { font-size: 13px; font-weight: 700; color: var(--text); }
  .cal-cell.outside .dnum { color: var(--muted); }
  .cal-cell .tdot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
  .cal-cell .donedot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
  }
  .cal-cell.mockdone .tdot {
    background: var(--c-mock) !important;
  }
  .mockdone-tick {
    position: absolute;
    bottom: 2px;
    right: 2px;
    font-size: 8px;
    font-weight: 900;
    color: var(--c-mock);
    line-height: 1;
  }
  .cal-cell.mockplanned {
    border-color: rgba(255, 82, 82, 0.35);
  }
  .mock-count-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: var(--c-mock);
    color: #fff;
    font-size: 8px;
    font-weight: 900;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .cal-legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .cal-legend .lg-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .cal-legend .sw {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  .cal-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-top: 12px;
  }
  .cal-detail .head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .cal-detail .date-lbl {
    font-size: 13px;
    font-weight: 700;
  }
  .cal-detail .meta-line {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .cal-detail .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0 6px;
    line-height: 1;
  }
  .cal-detail .topic-line { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .cal-detail .topic-line.done { text-decoration: line-through; color: var(--muted); }
  .cal-detail .field { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .cal-detail .field strong { color: var(--text); font-weight: 600; }
  .cal-detail .actions { margin-top: 12px; }

  /* === HEADER === */
  .top-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .top-strip .brand {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .top-strip .brand b { color: var(--text); }
  .top-strip .exam-cd {
    font-size: 10px;
    color: var(--warning);
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* === CONFETTI === */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 1px;
    pointer-events: none;
    animation: explode 800ms ease-out forwards;
  }
  @keyframes explode {
    from { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    to   { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }

  /* small utility */
  .gap-sm { height: 6px; }
  .gap-md { height: 12px; }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 24px 12px;
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="app">

  <div id="view-week" class="view active"></div>
  <div id="view-mocks" class="view"></div>
  <div id="view-topics" class="view"></div>
  <div id="view-calendar" class="view"></div>

  <nav id="nav">
    <button class="nav-btn active" data-view="week" onclick="showView('week')">
      <span class="ico">📊</span><span>WEEK</span>
    </button>
    <button class="nav-btn" data-view="mocks" onclick="showView('mocks')">

function load(key, dflt) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return dflt;
    return JSON.parse(raw);
  } catch (e) {
    console.warn('load failed for', key, e);

function save(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch (e) {
    console.warn('save failed for', key, e);
  }
}

// DATE HELPERS

function pad2(n) { return String(n).padStart(2, '0'); }
function ymd(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function todayYMD() { return ymd(new Date()); }
function parseDateStr(str, year) {
  // "May 16" or "June 8" or "Jul 17"
  const parts = str.trim().split(/\s+/);
  const mo = MONTH_MAP[parts[0]];
  const da = parseInt(parts[1], 10);
  return new Date(year, mo, da);
}
function dayDiff(a, b) {
  // returns whole days between a and b, ignoring TZ drift
  const ms = b.getTime() - a.getTime();
  return Math.round(ms / 86400000);
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function fromYMD(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDay(d) {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function fmtMonthName(d, short) {
  const names = short
    ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    : ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return names[d.getMonth()];
}

function parsePlan() {
  // Try cache
  const cached = load(STORE_KEYS.PLAN, null);
  if (cached && cached.version === PLAN_VERSION && cached.weeks && cached.weeks.length === 15) {
    return cached;
  }

  const lines = PLAN_MARKDOWN.split('\n');
  const weeks = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Week header: "## Week 1 (May 16 – May 22) — ..."
    const wkMatch = line.match(/^##\s+Week\s+(\d+)\s+\(([^)]+)\)/);
    if (wkMatch) {
      const weekNum = parseInt(wkMatch[1], 10);
      const dateRange = wkMatch[2].trim(); // "May 16 – May 22"
      const week = parseWeekBlock(lines, i, weekNum, dateRange);
      weeks.push(week);
      i = week._nextIdx;
      continue;
    }

    // Diagnostic day standalone — "# DIAGNOSTIC DAY: May 30 (Saturday)"
    const diagMatch = line.match(/^#\s+DIAGNOSTIC DAY:\s+([A-Z][a-z]+\s+\d+)/);
    if (diagMatch) {
      // Attach this day(s) to the previous week (Week 2) as additional entries
      const prevWeek = weeks[weeks.length - 1];
      if (prevWeek) {
        const diagDays = parseStandaloneDays(lines, i);
        for (const d of diagDays) {
          prevWeek.days.push(d);
        }
        // Extend prevWeek endDate if needed
        const lastDate = diagDays.map(d => fromYMD(d.date)).sort((a,b)=>b-a)[0];
        if (lastDate && ymd(lastDate) > prevWeek.endDate) {
          prevWeek.endDate = ymd(lastDate);
        }
      }
      // Advance past this diagnostic block to the next ## Week or # PHASE header
      let j = i + 1;
      while (j < lines.length && !lines[j].match(/^##\s+Week\s+\d+/) && !lines[j].match(/^#\s+PHASE/)) {
        j++;
      }
      i = j;
      continue;
    }
    i++;
  }

  const parsed = {
    version: PLAN_VERSION,
    weeks: weeks
  };
  save(STORE_KEYS.PLAN, parsed);
  return parsed;
}

function parseStandaloneDays(lines, startIdx) {
  // Parse all day entries between this header and the next ## Week / # PHASE header
  const days = [];
  let i = startIdx + 1;
  while (i < lines.length) {
    if (lines[i].match(/^##\s+Week\s+\d+/)) break;
    if (lines[i].match(/^#\s+PHASE/)) break;
    const dayMatch = lines[i].match(/^###\s+(MON|TUE|WED|THU|FRI|SAT|SUN)\s+([A-Z][a-z]+\s+\d+)\s+—\s+(.+)$/);
    if (dayMatch) {
      const d = parseDayBlock(lines, i, dayMatch);
      days.push(d.day);
      i = d.nextIdx;
      continue;
    }
    i++;
  }
  return days;
}

function parseWeekBlock(lines, startIdx, weekNum, dateRange) {
  // dateRange e.g. "May 16 – May 22"
  // Find startDate and endDate
  const rangeParts = dateRange.split(/\s*[–-]\s*/);
  let startDateStr = rangeParts[0]; // "May 16"
  let endDateStr = rangeParts[1];    // "May 22"
  // If endDate is just a number (e.g. "May 16 – 22"), we'd handle it; spec has full "May 22"
  // But for cross-month ranges like "July 27 – August 2", parsing is straightforward.

  const startDate = parseDateStr(startDateStr, PLAN_YEAR);
  let endDate;
  if (/^\d+$/.test(endDateStr.trim())) {
    // bare day → same month as start
    endDate = new Date(PLAN_YEAR, startDate.getMonth(), parseInt(endDateStr.trim(), 10));
  } else {
    endDate = parseDateStr(endDateStr, PLAN_YEAR);
  }

  const days = [];
  let i = startIdx + 1;
  while (i < lines.length) {
    // Stop at next week or phase header
    if (lines[i].match(/^##\s+Week\s+\d+/)) break;
    if (lines[i].match(/^#\s+PHASE/)) break;
    if (lines[i].match(/^#\s+DIAGNOSTIC DAY/)) break;
    if (lines[i].match(/^#\s+APPENDICES/)) break;

    // Day header: "### MON May 18 — CONCEPT (Quant)"
    const dayMatch = lines[i].match(/^###\s+(MON|TUE|WED|THU|FRI|SAT|SUN)\s+([A-Z][a-z]+\s+\d+)\s+—\s+(.+)$/);
    if (dayMatch) {
      const d = parseDayBlock(lines, i, dayMatch);
      days.push(d.day);
      i = d.nextIdx;
      continue;
    }
    i++;
  }

  return {
    weekNum,
    dateRange,
    startDate: ymd(startDate),
    endDate: ymd(endDate),
    phase: PHASE_OF_WEEK[weekNum] || '',
    winCondition: WIN_CONDITIONS[weekNum] || '',
    days,
    _nextIdx: i
  };
}

function parseDayBlock(lines, startIdx, dayMatch) {
  const label = dayMatch[1];          // "MON"
  const dateText = dayMatch[2];       // "May 18"
  const titleRest = dayMatch[3];      // "CONCEPT (Quant)" or "MOCK (Diagnostic)" etc.

  const dateObj = parseDateStr(dateText, PLAN_YEAR);
  const dateISO = ymd(dateObj);

  // Determine day type by scanning the titleRest
  const titleUpper = titleRest.toUpperCase();
  let type = 'CONCEPT';
  if      (titleUpper.includes('EXAM'))    type = 'EXAM';
  else if (titleUpper.includes('MOCK'))    type = 'MOCK';
  else if (titleUpper.includes('DRILL'))   type = 'DRILL';
  else if (titleUpper.includes('SLIP'))    type = 'SLIP';
  else if (titleUpper.includes('REST'))    type = 'SLIP';
  else if (titleUpper.includes('TAPER'))   type = 'REVIEW';
  else if (titleUpper.includes('REVIEW'))  type = 'REVIEW';
  else if (titleUpper.includes('PLANNING')) type = 'REVIEW';
  else if (titleUpper.includes('LIGHT'))   type = 'REVIEW';
  else if (titleUpper.includes('DRESS'))   type = 'MOCK';
  else if (titleUpper.includes('CONCEPT')) type = 'CONCEPT';

  let topic = '', resource = '', task = '', time = '', staywarm = '';

  let i = startIdx + 1;
  while (i < lines.length) {
    const l = lines[i];
    if (l.match(/^###\s+(MON|TUE|WED|THU|FRI|SAT|SUN)\s+/)) break;
    if (l.match(/^##\s+Week\s+\d+/)) break;
    if (l.match(/^#\s+PHASE/)) break;
    if (l.match(/^#\s+DIAGNOSTIC DAY/)) break;
    if (l.match(/^#\s+APPENDICES/)) break;

    // Match bullet fields: - **Topic:** value
    const fieldMatch = l.match(/^-\s+\*\*([^*]+):\*\*\s*(.*)$/);
    if (fieldMatch) {
      const key = fieldMatch[1].trim().toLowerCase();
      const val = fieldMatch[2].trim();
      if (key === 'topic')                     topic = val;
      else if (key === 'resource' || key === 'resources') resource = val;
      else if (key === 'task' || key === 'mock' || key === 'conditions') {
        // The MOCK day uses "Mock:" instead of "Topic:" sometimes
        if (key === 'mock' && !topic) topic = val;
        else if (key === 'conditions' && !resource) resource = val;
        else task = task ? task + ' ' + val : val;
      }
      else if (key === 'time')                 time = val;
      else if (key === 'stay-warm')            staywarm = val;
    }
    // Also handle non-bullet bold fields (exam day uses **Wake time:** etc.)
    const boldMatch = l.match(/^\*\*([^*]+):\*\*\s*(.+)$/);
    if (boldMatch && !fieldMatch) {
      const key = boldMatch[1].trim().toLowerCase();
      const val = boldMatch[2].trim();
      if (!topic && (key === 'wake time' || key === 'breakfast' || key === 'travel' || key === 'at the test center' || key === 'during the exam')) {
        // For exam day, build a simple topic and stitch the rest into task
        if (!topic) topic = 'GMAT FOCUS EDITION — EXAM DAY';
        task = task ? task + ' • ' + key.charAt(0).toUpperCase() + key.slice(1) + ': ' + val
                    : key.charAt(0).toUpperCase() + key.slice(1) + ': ' + val;
      }
    }
    i++;
  }

  if (!topic) topic = titleRest;

  return {
    nextIdx: i,
    day: { label, type, topic, resource, task, time, staywarm, date: dateISO, title: titleRest }
  };
}

// =====================================================================
function getCurrentWeek() {
  const today = todayYMD();
  for (const w of PLAN.weeks) {
    if (today >= w.startDate && today <= w.endDate) return w.weekNum;
  }
  // Before plan?
  if (today < PLAN.weeks[0].startDate) return 1;
  // After plan
  return 15;
}

let viewedWeek = getCurrentWeek();

// =====================================================================
// UTILITY
// =====================================================================
function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function daysUntilExam() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const exam = fromYMD(EXAM_DATE);
  return Math.max(0, dayDiff(today, exam));
}

function burstConfetti() {
  const root = document.getElementById('confetti');
  const colors = ['#4F8EF7','#3DDC84','#FFBB33','#FF5252','#FF8C42','#F1F1F3'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = colors[i % colors.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 90 + Math.random() * 160;
    p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
    p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    root.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// =====================================================================
// WEEK VIEW

function renderWeek() {
  const root = document.getElementById('view-week');
  const state = getState();
  const week = PLAN.weeks.find(w => w.weekNum === viewedWeek) || PLAN.weeks[0];

  const winChecked = !!state.wins[week.weekNum];
  const bufferUsed = !!(state.buffer[week.weekNum] && state.buffer[week.weekNum].used);

  // Phase progress bar
  let phaseBarHTML = '<div class="phase-bar">';
  for (let i = 1; i <= 15; i++) {
    const ph = PHASE_OF_WEEK[i];
    const color = state.wins[i] ? PHASE_COLOR[ph] : (i <= getCurrentWeek() ? PHASE_COLOR[ph] : 'var(--border)');
    const isCur = (i === week.weekNum) ? ' current' : '';
    phaseBarHTML += `<div class="phase-seg${isCur}" style="background:${color}"></div>`;
  }
  phaseBarHTML += '</div>';

  // Day strip — show all days of this week
  const today = todayYMD();
  let stripHTML = '<div class="day-strip">';
  for (const d of week.days) {
    const isToday = d.date === today;
    const isDone = !!state.days[d.date];
    stripHTML += `
      <div class="day${isToday ? ' today' : ''}${isDone ? ' done' : ''}" data-date="${d.date}" onclick="scrollToDayCard('${d.date}')">
        <span class="lbl">${d.label}</span>
        <span class="dot"></span>
        <span class="dnum">${parseInt(d.date.split('-')[2],10)}</span>
      </div>
    `;
  }
  stripHTML += '</div>';

  // Day cards
  let dayCardsHTML = '';
  for (const d of week.days) {
    const isDone = !!state.days[d.date];
    const dateObj = fromYMD(d.date);
    const dateLbl = fmtMonthName(dateObj, true) + ' ' + parseInt(d.date.split('-')[2],10);
    const showBuffer = (d.label === 'FRI' && d.type !== 'MOCK' && !bufferUsed);
    dayCardsHTML += `
      <div class="day-card${isDone ? ' done' : ''}" id="card-${d.date}">
        <div class="head">
          <div class="left">
            <span class="daylbl">${d.label}</span>
            <span class="badge-type ${d.type}">${d.type}</span>
          </div>
          <span class="date">${dateLbl}</span>
        </div>
        <div class="topic">${escapeHtml(d.topic)}</div>
        ${d.resource ? `<div class="meta"><strong>Resource:</strong> ${escapeHtml(d.resource)}</div>` : ''}
        ${d.task ? `<div class="meta"><strong>Task:</strong> ${escapeHtml(d.task)}</div>` : ''}
        ${d.staywarm ? `<div class="meta"><strong>Stay-warm:</strong> ${escapeHtml(d.staywarm)}</div>` : ''}
        ${d.time ? `<div class="meta"><strong>Time:</strong> ${escapeHtml(d.time)}</div>` : ''}
        <div class="actions">
          <button class="btn ${isDone ? 'success' : 'primary'}" onclick="toggleDay('${d.date}')">${isDone ? '✓ Done' : 'Mark done'}</button>
          ${showBuffer ? `<button class="btn warning" onclick="useBuffer(${week.weekNum}, '${d.date}')">Use buffer day (1/week)</button>` : ''}
        </div>
      </div>
    `;
  }

  const milestoneHTML = MILESTONES[week.weekNum] ? `<div class="milestone">${escapeHtml(MILESTONES[week.weekNum])}</div>` : '';

  root.innerHTML = `
    <div class="top-strip">
      <div class="brand"><b>GMAT</b> · Focus Tracker</div>
      <div class="exam-cd">${daysUntilExam()}d to exam</div>
    </div>
    ${phaseBarHTML}
    <div class="phase-labels">
      <span style="color:${PHASE_COLOR.Foundation}">Foundation</span>
      <span style="color:${PHASE_COLOR.Drilling}">Drilling</span>
      <span style="color:${PHASE_COLOR.Integration}">Integration</span>
      <span style="color:${PHASE_COLOR.Peak}">Peak</span>
    </div>

    <div class="week-header">
      <div class="label">WEEK ${week.weekNum} OF 15</div>
      <div class="range">${escapeHtml(week.dateRange)}</div>
      <span class="pill" style="background:${PHASE_COLOR[week.phase]}40; color:${PHASE_COLOR[week.phase]}; border:1px solid ${PHASE_COLOR[week.phase]}">${escapeHtml(week.phase)}</span>
    </div>

    <div class="week-nav">
      <button class="btn small" onclick="changeWeek(-1)" ${week.weekNum === 1 ? 'disabled' : ''}>← Prev</button>
      <button class="btn small" onclick="goCurrentWeek()">This week</button>
      <button class="btn small" onclick="changeWeek(1)" ${week.weekNum === 15 ? 'disabled' : ''}>Next →</button>
    </div>

    ${stripHTML}

    <div class="win-row${winChecked ? ' done' : ''}" onclick="toggleWin(${week.weekNum})">
      <div class="cbox"></div>
      <div class="txt">
        <div class="ttl">Weekly Win</div>
        ${escapeHtml(week.winCondition || 'Complete the week plan.')}
      </div>
    </div>

    ${milestoneHTML}

    <div class="section-title">Days</div>
    ${dayCardsHTML}
  `;
}

function changeWeek(delta) {
  const newWk = viewedWeek + delta;
  if (newWk < 1 || newWk > 15) return;
  viewedWeek = newWk;
  renderWeek();
}
function goCurrentWeek() {
  viewedWeek = getCurrentWeek();
  renderWeek();
}
function scrollToDayCard(dateStr) {
  const el = document.getElementById('card-' + dateStr);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function toggleDay(dateStr) {
  const days = load(STORE_KEYS.DAYS, {});
  const wasDone = !!days[dateStr];
  if (wasDone) {
    delete days[dateStr];
  } else {
    days[dateStr] = true;
  }
  save(STORE_KEYS.DAYS, days);
  if (!wasDone) burstConfetti();
  renderWeek();
  renderCalendar();
}
function toggleWin(weekNum) {
  const wins = load(STORE_KEYS.WINS, {});
  const wasWon = !!wins[weekNum];
  if (wasWon) {
    delete wins[weekNum];
  } else {
    wins[weekNum] = true;
  }
  save(STORE_KEYS.WINS, wins);
  if (!wasWon) burstConfetti();
  renderWeek();
}
function useBuffer(weekNum, dateStr) {
  const buf = load(STORE_KEYS.BUFFER, {});
  buf[weekNum] = { used: true, date: dateStr };
  save(STORE_KEYS.BUFFER, buf);
  // Also mark the day done
  const days = load(STORE_KEYS.DAYS, {});
  days[dateStr] = true;
  save(STORE_KEYS.DAYS, days);
  burstConfetti();
  renderWeek();
  renderCalendar();
}

function renderMocks() {
  const root = document.getElementById('view-mocks');
  const mocks = load(STORE_KEYS.MOCKS, []);
  // Ensure they're in inventory order
  const ordered = MOCK_INVENTORY.map(inv => mocks.find(m => m.id === inv.id) || { id: inv.id, name: inv.name, scheduledWeek: inv.scheduledWeek, checked: false, attempts: [] });

  // Sparkline
  const allAttempts = [];
  for (const m of ordered) {
    const inv = MOCK_INVENTORY.find(x => x.id === m.id);
    (m.attempts || []).forEach((a, idx) => {
      const total = parseInt(a.scores && a.scores.total, 10);
      if (total) {
        allAttempts.push({
          mock: m.name,
          total,
          date: a.date || '',
          attemptNum: a.attemptNum || (idx + 1),
          scheduledWeek: m.scheduledWeek,
          isRetake: (a.attemptNum || (idx + 1)) > 1
        });
      }
    });
  }
  // Sort by date if available, else by scheduledWeek then attemptNum
  allAttempts.sort((a, b) => {
    if (a.date && b.date) return a.date < b.date ? -1 : 1;
    if (a.scheduledWeek !== b.scheduledWeek) return a.scheduledWeek - b.scheduledWeek;
    return a.attemptNum - b.attemptNum;
  });

  let sparkHTML = '';
  if (allAttempts.length >= 2) {
    const totals = allAttempts.map(a => a.total);
    const minT = Math.min(...totals);
    const maxT = Math.max(...totals);
    const range = Math.max(maxT - minT, 50);
    const W = 380, H = 90, padX = 20, padY = 14;
    const stepX = (W - 2*padX) / (allAttempts.length - 1 || 1);
    let pathD = '';
    let dots = '';
    allAttempts.forEach((a, i) => {
      const x = padX + i * stepX;
      const yNorm = (a.total - minT) / range;
      const y = H - padY - yNorm * (H - 2*padY);
      pathD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      const color = a.isRetake ? '#FFBB33' : '#4F8EF7';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${color}" stroke="#1A1A1F" stroke-width="2"/>`;
    });
    sparkHTML = `
      <div class="sparkline-card">
        <div class="section-title" style="margin-bottom:6px">Score Trend</div>
        <div class="sparkline">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <path d="${pathD}" fill="none" stroke="#4F8EF7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            ${dots}
          </svg>
        </div>
        <div class="stats">
          <div><span class="val">${minT}</span>Min</div>
          <div><span class="val">${maxT}</span>Max</div>
          <div><span class="val">${allAttempts.length}</span>Logged</div>
        </div>
        <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:6px">
          <span style="color:#4F8EF7">●</span> First take &nbsp; <span style="color:#FFBB33">●</span> Retake
        </div>
      </div>
    `;
  } else {
    sparkHTML = `
      <div class="sparkline-card">
        <div class="empty-state">Log 2+ mock scores to see your trend</div>
      </div>
    `;
  }

  // Mock cards — grouped by section header
  const GROUP_META = {
    prep:      { label: 'Prep Mocks',                    color: '#4F8EF7', note: 'Diagnostic + e-GMAT + Expert\'s Global' },
    gmatclub:  { label: 'GMAT Club Blitz',               color: '#FF8C42', note: '8 mocks · Jun 12–19 · 1/day' },
    official:  { label: 'Official GMAT — Take 1',        color: '#3DDC84', note: '6 tests · Wks 7–12' },
    official2: { label: 'Official GMAT — Take 2',        color: '#FF5252', note: '6 tests · Wks 12–14 · last Aug 23' },
  };

  let cardsHTML = '';

  // Summary bar counts

  cardsHTML += `

function saveAttempt(id, attemptNum) {
  const mocks = load(STORE_KEYS.MOCKS, []);
  const m = mocks.find(x => x.id === id);
  if (!m) return;
  const date  = document.getElementById('date-'  + id + '-' + attemptNum).value;
  const total = document.getElementById('total-' + id + '-' + attemptNum).value;
  const quant = document.getElementById('quant-' + id + '-' + attemptNum).value;
  const verbal= document.getElementById('verbal-'+ id + '-' + attemptNum).value;
  const di    = document.getElementById('di-'    + id + '-' + attemptNum).value;
  const notes = document.getElementById('notes-' + id + '-' + attemptNum).value;
  if (!m.attempts) m.attempts = [];
  m.attempts.push({
    attemptNum,
    date,
    scores: { total, quant, verbal, di },
    notes
  });
  m.checked = true;
  save(STORE_KEYS.MOCKS, mocks);
  renderMocks();
  renderCalendar();
}
function deleteAttempt(id, attemptNum) {
  if (!confirm('Delete attempt ' + attemptNum + '?')) return;
  const mocks = load(STORE_KEYS.MOCKS, []);
  const m = mocks.find(x => x.id === id);
  if (!m) return;
  m.attempts = (m.attempts || []).filter(a => a.attemptNum !== attemptNum);
  // Renumber remaining attempts
  m.attempts.forEach((a, i) => a.attemptNum = i + 1);
  if (m.attempts.length === 0) m.checked = false;
  save(STORE_KEYS.MOCKS, mocks);
  renderMocks();
  renderCalendar();
}

// =====================================================================
// TOPICS VIEW
// =====================================================================
function renderTopics() {
  const root = document.getElementById('view-topics');
  const state = load(STORE_KEYS.TOPICS, {});

  let groupsHTML = '';
  let totalAll = 0, masteredAll = 0;
  for (const g of TOPIC_GROUPS) {
    let mastered = 0, inProg = 0;
    let chips = '';
    for (const t of g.topics) {
      const key = g.name + '::' + t;
      const st = state[key] || 'not_started';
      if (st === 'mastered') mastered++;
      if (st === 'in_progress') inProg++;
      chips += `<span class="chip ${st}" onclick="cycleTopic('${escapeJsAttr(key)}')">${escapeHtml(t)}</span>`;
    }
    totalAll += g.topics.length;
    masteredAll += mastered;
    const pct = Math.round((mastered / g.topics.length) * 100);
    groupsHTML += `
      <div class="topic-group">
        <div class="ghead">
          <div class="gname">${escapeHtml(g.name)}</div>
          <div class="gstats">${mastered}/${g.topics.length} mastered · ${inProg} in progress</div>
        </div>
        <div class="gbar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="chips">${chips}</div>
      </div>
    `;
  }

  const overallPct = totalAll ? Math.round(masteredAll / totalAll * 100) : 0;

  root.innerHTML = `
    <div class="top-strip">
      <div class="brand"><b>TOPICS</b> · ${masteredAll}/${totalAll} mastered (${overallPct}%)</div>
      <div class="exam-cd">${daysUntilExam()}d to exam</div>
    </div>
    <div class="cal-legend" style="margin-bottom:18px">
      <span class="lg-item"><span class="sw" style="background:var(--card-2);border:1px solid var(--border)"></span>Not started</span>
      <span class="lg-item"><span class="sw" style="background:rgba(255,187,51,.4)"></span>In progress</span>
      <span class="lg-item"><span class="sw" style="background:var(--success)"></span>Mastered</span>
      <span style="margin-left:auto;color:var(--muted);font-size:10px">Tap a chip to cycle</span>
    </div>
    ${groupsHTML}
  `;
}

function escapeJsAttr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function cycleTopic(key) {
  const state = load(STORE_KEYS.TOPICS, {});
  const cur = state[key] || 'not_started';
  const next = cur === 'not_started' ? 'in_progress' : (cur === 'in_progress' ? 'mastered' : 'not_started');
  state[key] = next;
  save(STORE_KEYS.TOPICS, state);
  renderTopics();
}

// =====================================================================
// CALENDAR VIEW
// =====================================================================
let selectedCalDate = null;

function renderCalendar() {
  const root = document.getElementById('view-calendar');
  if (!calendarMonth) {
    const now = new Date();
    const planStart = fromYMD(PLAN.weeks[0].startDate);
    const planEnd   = fromYMD(EXAM_DATE);
    if (now < planStart)     calendarMonth = new Date(planStart.getFullYear(), planStart.getMonth(), 1);
    else if (now > planEnd)  calendarMonth = new Date(planEnd.getFullYear(),   planEnd.getMonth(),   1);
    else                     calendarMonth = new Date(now.getFullYear(),        now.getMonth(),        1);
  }

  const state     = getState();
  const monthName = fmtMonthName(calendarMonth, false) + ' ' + calendarMonth.getFullYear();
  const planStart = fromYMD(PLAN.weeks[0].startDate);
  const planEnd   = fromYMD(EXAM_DATE);
  const earliest  = new Date(2026, 4, 1);
  const latest    = new Date(2026, 7, 1);
  const canPrev   = calendarMonth > earliest;
  const canNext   = calendarMonth < latest;

  // ── Build mock lookup: dateISO → { ids[], anyChecked } ──────────────
  // Derived entirely from MOCK_INVENTORY.dateHint — covers all 23 mocks
  // including blitz days and Take 2 dates not in the plan markdown.
  const mockByDate = {};
  for (const inv of MOCK_INVENTORY) {
    if (!inv.dateHint) continue;
    const parts = inv.dateHint.trim().split(/\s+/);
    const mo    = MONTH_MAP[parts[0]];
    const da    = parseInt(parts[1], 10);
    if (mo === undefined || isNaN(da)) continue;
    const ds = ymd(new Date(PLAN_YEAR, mo, da));
    if (!mockByDate[ds]) mockByDate[ds] = { ids: [], anyChecked: false };
    mockByDate[ds].ids.push(inv.id);
  }
  // Overlay checked state from saved mocks
  for (const m of (state.mocks || [])) {
    if (!m.checked) continue;
    const inv = MOCK_INVENTORY.find(x => x.id === m.id);
    if (!inv || !inv.dateHint) continue;
    const parts = inv.dateHint.trim().split(/\s+/);
    const mo    = MONTH_MAP[parts[0]];
    const da    = parseInt(parts[1], 10);
    if (mo === undefined || isNaN(da)) continue;
    const ds = ymd(new Date(PLAN_YEAR, mo, da));
    if (mockByDate[ds]) mockByDate[ds].anyChecked = true;
  }

  // ── Calendar grid ───────────────────────────────────────────────────
  const year        = calendarMonth.getFullYear();
  const month       = calendarMonth.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const leadOffset  = (new Date(year, month, 1).getDay() + 6) % 7; // Mon-first

  let gridHTML = `<div class="cal-grid">
    <div class="cal-wd">MON</div><div class="cal-wd">TUE</div><div class="cal-wd">WED</div>
    <div class="cal-wd">THU</div><div class="cal-wd">FRI</div><div class="cal-wd">SAT</div>
    <div class="cal-wd">SUN</div>`;

  for (let i = 0; i < leadOffset; i++) gridHTML += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj  = new Date(year, month, d);
    const dateStr  = ymd(dateObj);
    const inRange  = (dateObj >= planStart && dateObj <= planEnd);
    const planDay  = DAY_BY_DATE[dateStr];
    const mockInfo = mockByDate[dateStr];
    const isToday  = (dateStr === todayYMD());
    const isDone   = !!state.days[dateStr];
    const isSelected = (selectedCalDate === dateStr);

    // CSS classes — identical logic to original
    let cls = 'cal-cell';
    if (!inRange)               cls += ' outside';
    if (isToday)                cls += ' today';
    if (isSelected)             cls += ' selected';
    if (mockInfo && mockInfo.anyChecked) cls += ' mockdone';

    // Dot colour — mock dates always red; otherwise use plan day type
    let dotColor = 'transparent';
    if (mockInfo) {
      dotColor = 'var(--c-mock)';
    } else if (planDay) {
      const t = planDay.type;
      if      (t === 'CONCEPT') dotColor = 'var(--c-concept)';
      else if (t === 'DRILL')   dotColor = 'var(--c-drill)';
      else if (t === 'REVIEW')  dotColor = 'var(--c-review)';
      else if (t === 'MOCK')    dotColor = 'var(--c-mock)';
      else if (t === 'EXAM')    dotColor = 'var(--text)';
      else                      dotColor = 'var(--c-slip)';
    }

    const opacity       = (mockInfo && !mockInfo.anyChecked) ? ';opacity:0.45' : '';
    const clickHandler  = inRange ? `onclick="selectCalDate('${dateStr}')"` : '';
    const doneDot       = (isDone && !mockInfo) ? `<span class="donedot"></span>` : '';
    const mockBadge     = (mockInfo && mockInfo.ids.length > 1)
                            ? `<span style="position:absolute;top:2px;right:2px;background:var(--c-mock);color:#fff;font-size:8px;font-weight:900;width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center">${mockInfo.ids.length}</span>`
                            : '';

    gridHTML += `
      <div class="${cls}" ${clickHandler}>
        <span class="dnum">${d}</span>
        <span class="tdot" style="background:${dotColor}${opacity}"></span>
        ${doneDot}${mockBadge}
      </div>`;
  }
  gridHTML += '</div>';

  // ── Detail panel ─────────────────────────────────────────────────────
  let detailHTML = '';
  if (selectedCalDate) {
    const planDay  = DAY_BY_DATE[selectedCalDate];
    const mockInfo = mockByDate[selectedCalDate];
    const dateObj  = fromYMD(selectedCalDate);
    const dateLbl  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dateObj.getDay()]
                     + ', ' + fmtMonthName(dateObj, false) + ' ' + dateObj.getDate();

    // Helper: week number for any date
    const wNum = (() => {
      for (const w of PLAN.weeks) {
        if (selectedCalDate >= w.startDate && selectedCalDate <= w.endDate) return w.weekNum;
      }
      return null;
    })();
    const wObj  = wNum ? PLAN.weeks.find(x => x.weekNum === wNum) : null;
    const phase = wObj ? wObj.phase : '';

    // Mock list snippet — only shown when plan day is NOT itself a mock
    // (if planDay.type === 'MOCK', the plan topic already shows the mock name)
    const mockListHTML = (mockInfo && planDay && planDay.type !== 'MOCK') ? (() => {
      const rows = mockInfo.ids.map(id => {
        const inv     = MOCK_INVENTORY.find(x => x.id === id);
        const mState  = (state.mocks || []).find(x => x.id === id);
        const checked = mState && mState.checked;
        const name    = inv ? inv.name : id;
        return `<div style="font-size:12px;color:${checked ? 'var(--success)' : 'var(--c-mock)'};margin-top:4px;font-weight:600">`
             + `${checked ? '✓' : '🎯'} ${escapeHtml(name)}</div>`;
      }).join('');
      return `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${rows}</div>`;
    })() : '';

    if (planDay) {
      // ── Normal plan day (may also have a mock scheduled) ──
      const isDone = !!state.days[selectedCalDate];
      detailHTML = `
        <div class="cal-detail">
          <div class="head">
            <div>
              <div class="date-lbl">${dateLbl}</div>
              <div class="meta-line">${wNum ? `Week ${wNum} · ` : ''}${escapeHtml(phase)} · <span class="badge-type ${planDay.type}">${planDay.type}</span></div>
            </div>
            <button class="close-btn" onclick="closeCalDetail()">✕</button>
          </div>
          <div class="topic-line${isDone ? ' done' : ''}">${escapeHtml(planDay.topic)}</div>
          ${planDay.resource ? `<div class="field"><strong>Resource:</strong> ${escapeHtml(planDay.resource)}</div>` : ''}
          ${planDay.task     ? `<div class="field"><strong>Task:</strong> ${escapeHtml(planDay.task)}</div>`         : ''}
          ${planDay.staywarm ? `<div class="field"><strong>Stay-warm:</strong> ${escapeHtml(planDay.staywarm)}</div>` : ''}
          ${planDay.time     ? `<div class="field"><strong>Time:</strong> ${escapeHtml(planDay.time)}</div>`         : ''}
          ${mockListHTML}
          <div class="actions">
            <button class="btn ${isDone ? 'success' : 'primary'}" onclick="toggleDay('${selectedCalDate}')">
              ${isDone ? '✓ Done' : 'Mark done'}
            </button>
          </div>
        </div>`;

    } else if (mockInfo) {
      // ── Mock-only date (GMAT Club blitz / Take 2 dates not in plan) ──
      detailHTML = `
        <div class="cal-detail">
          <div class="head">
            <div>
              <div class="date-lbl">${dateLbl}</div>
              <div class="meta-line">${wNum ? `Week ${wNum} · ` : ''}<span class="badge-type MOCK">MOCK</span></div>
            </div>
            <button class="close-btn" onclick="closeCalDetail()">✕</button>
          </div>
          <div class="topic-line">Mock Day</div>
          ${mockListHTML}
          <div class="field" style="margin-top:8px">Full 2h15m · No pausing · Review same day</div>
          <div class="actions">
            <button class="btn muted small" onclick="closeCalDetail()">Close</button>
          </div>
        </div>`;

    } else {
      // ── Outside plan range ──
      detailHTML = `
        <div class="cal-detail">
          <div class="head">
            <div>
              <div class="date-lbl">${dateLbl}</div>
              <div class="meta-line">Outside the plan range.</div>
            </div>
            <button class="close-btn" onclick="closeCalDetail()">✕</button>
          </div>
        </div>`;
    }
  }

  // ── Assemble ─────────────────────────────────────────────────────────
  root.innerHTML = `
    <div class="top-strip">
      <div class="brand"><b>CALENDAR</b> · May–Aug 2026</div>
      <div class="exam-cd">${daysUntilExam()}d to exam</div>
    </div>
    <div class="cal-header">
      <button class="navbtn" onclick="changeMonth(-1)" ${canPrev ? '' : 'disabled'}>‹</button>
      <div class="month-title">${monthName}</div>
      <button class="navbtn" onclick="changeMonth(1)" ${canNext ? '' : 'disabled'}>›</button>
    </div>
    ${gridHTML}
    <div class="cal-legend">
      <span class="lg-item"><span class="sw" style="background:var(--c-concept)"></span>Concept</span>
      <span class="lg-item"><span class="sw" style="background:var(--c-drill)"></span>Drill</span>
      <span class="lg-item"><span class="sw" style="background:var(--c-review)"></span>Review</span>
      <span class="lg-item"><span class="sw" style="background:var(--c-mock);opacity:0.45"></span>Mock (due)</span>
      <span class="lg-item"><span class="sw" style="background:var(--c-mock)"></span>Mock (done)</span>
      <span class="lg-item"><span class="sw" style="background:var(--c-slip)"></span>Slip/Rest</span>
      <span class="lg-item"><span class="sw" style="background:var(--success);border-radius:50%"></span>Day done</span>
    </div>
    ${detailHTML}
  `;
}

function changeMonth(delta) {
  const m = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
  const earliest = new Date(2026, 4, 1);
  const latest   = new Date(2026, 7, 1);
  if (m < earliest || m > latest) return;
  calendarMonth = m;
  selectedCalDate = null;
  renderCalendar();
}
function selectCalDate(dateStr) {
  selectedCalDate = (selectedCalDate === dateStr) ? null : dateStr;
  renderCalendar();
}
function closeCalDetail() {
  selectedCalDate = null;
  renderCalendar();
}

// =====================================================================
// NAVIGATION
// =====================================================================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('#nav .nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
  if (name === 'week') renderWeek();
  else if (name === 'mocks') renderMocks();
  else if (name === 'topics') renderTopics();
  else if (name === 'calendar') renderCalendar();
  window.scrollTo(0, 0);
}

// =====================================================================
// BOOT
// =====================================================================
renderWeek();
// Pre-render others so cross-tab updates are fast
renderMocks();
renderTopics();
renderCalendar();
showView('week');
</script>
